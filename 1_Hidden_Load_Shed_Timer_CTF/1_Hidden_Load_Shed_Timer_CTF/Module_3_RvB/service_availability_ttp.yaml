id: a6ef1b70-137a-42c6-95e2-e1d5a7d7f763
name: OpenPLC Availability Check
description: >
  Verifies OpenPLC v3 is fully operational via three checks:
  (1) TCP port 8080 is bound, (2) openplc service is Active,
  (3) HTTP probe to http://localhost:8080/ returns a valid code.
  Additionally confirms Modbus TCP port 502 is open.
  All checks must pass for SERVICE_STATUS:UP; any failure exits 1.
tactic: execution
technique_id: T1059
technique_name: Command and Scripting Interpreter
sub_technique: T1059.004
tag: service-availability
executors:
  - name: sh
    platform: linux
    command: |
      PORT_UP=$(ss -tlnp 2>/dev/null | grep -q ':8080 ' && echo 1 || echo 0); MODBUS_UP=$(ss -tlnp 2>/dev/null | grep -q ':502 ' && echo 1 || (nc -z 127.0.0.1 502 2>/dev/null && echo 1 || echo 0)); SVC_STATE=$(systemctl is-active openplc 2>/dev/null || ( (podman ps | grep -q openplc || docker ps | grep -q openplc || pgrep -f openplc > /dev/null) && echo "active" || echo "inactive" )); HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 --max-time 5 http://localhost:8080/ 2>/dev/null || echo "000"); if [ "$PORT_UP" -ge 1 ] && [ "$SVC_STATE" = "active" ] && { [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "403" ]; }; then echo "SERVICE_STATUS:UP | MODBUS:$([ "$MODBUS_UP" -ge 1 ] && echo OPEN || echo CLOSED)"; else PORT_LABEL=$([ "$PORT_UP" -ge 1 ] && echo "UP" || echo "DOWN"); echo "SERVICE_STATUS:DOWN | PORT:${PORT_LABEL} | SYSTEMD:${SVC_STATE} | HTTP:${HTTP_CODE}"; exit 1; fi
    payloads: []
    parsers: []
